<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none">
  <!-- outer box -->
  <rect x="1" y="2.5" width="14" height="12.5" rx="2" stroke="#555" stroke-width="1.4"/>
  <!-- header bar -->
  <rect x="1" y="2.5" width="14" height="4" rx="2" fill="#555"/>
  <rect x="1" y="4.5" width="14" height="2" fill="#555"/>
  <!-- binding pegs -->
  <line x1="5" y1="1" x2="5" y2="4" stroke="#555" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="11" y1="1" x2="11" y2="4" stroke="#555" stroke-width="1.4" stroke-linecap="round"/>
  <!-- grid dots -->
  <rect x="3.5" y="8"  width="1.5" height="1.5" rx="0.3" fill="#555"/>
  <rect x="7.2" y="8"  width="1.5" height="1.5" rx="0.3" fill="#555"/>
  <rect x="11"  y="8"  width="1.5" height="1.5" rx="0.3" fill="#555"/>
  <rect x="3.5" y="11" width="1.5" height="1.5" rx="0.3" fill="#555"/>
  <rect x="7.2" y="11" width="1.5" height="1.5" rx="0.3" fill="#555"/>
</svg>
