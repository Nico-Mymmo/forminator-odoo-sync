<!DOCTYPE html>
<html>
<head>
    <title>Run Migration</title>
    <style>
        body { font-family: monospace; padding: 20px; max-width: 800px; margin: 0 auto; }
        button { padding: 10px 20px; background: #0070f3; color: white; border: none; cursor: pointer; }
        pre { background: #f5f5f5; padding: 15px; overflow-x: auto; }
        .result { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Database Migration Tool</h1>
    <p>Click the button below to check and run the username migration:</p>
    <button onclick="runMigration()">Check/Run Username Migration</button>
    
    <div class="result" id="result"></div>
    
    <script>
        async function runMigration() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Running migration...</p>';
            
            try {
                const response = await fetch('/run-username-migration');
                const data = await response.json();
                
                resultDiv.innerHTML = '<h2>Result:</h2><pre>' + JSON.stringify(data, null, 2) + '</pre>';
                
                if (data.sql) {
                    resultDiv.innerHTML += '<h3>Run this SQL in Supabase SQL Editor:</h3><pre>' + data.sql + '</pre>';
                    resultDiv.innerHTML += '<p><a href="https://supabase.com/dashboard" target="_blank">Open Supabase Dashboard →</a></p>';
                }
            } catch (err) {
                resultDiv.innerHTML = '<p style="color:red;">Error: ' + err.message + '</p>';
            }
        }
    </script>
</body>
</html>
