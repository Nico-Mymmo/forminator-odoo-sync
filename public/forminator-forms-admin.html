<!DOCTYPE html>
<html lang="nl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forminator Forms Beheer - OpenVME Operations Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-base-200" style="overflow-y: scroll;">
    <div id="navbar"></div>
    
    <div style="padding-top: 48px;">
      <div class="pb-8">
        <div class="container mx-auto px-6 max-w-7xl">
          <div class="mb-8">
            <h1 class="text-4xl font-bold mb-2">
              <i data-lucide="layout-list" class="w-8 h-8 inline-block"></i>
              Forminator Forms Beheer
            </h1>
            <p class="text-base-content/60">
              Beheer formulieren die beschikbaar zijn in de event editor form picker
            </p>
          </div>

          <div class="card bg-base-100 shadow-xl mb-8">
            <div class="card-body">
              <div class="flex justify-between items-center mb-6">
                <h2 class="card-title text-2xl">Formulieren</h2>
                <button id="addFormBtn" class="btn btn-primary btn-sm">
                  <i data-lucide="plus" class="w-4 h-4"></i>
                  Nieuw Formulier
                </button>
              </div>
              
              <div id="formsTable" class="overflow-x-auto">
                <div class="flex justify-center py-8">
                  <span class="loading loading-spinner loading-lg"></span>
                </div>
              </div>
            </div>
          </div>

          <div class="alert alert-info">
            <i data-lucide="info" class="w-5 h-5"></i>
            <div>
              <h3 class="font-bold">Forminator Form ID vinden</h3>
              <p class="text-sm">
                In WordPress: Ga naar <strong>Forminator → Forms</strong>, hover over een formulier en noteer het ID in de URL (bijv. <code>id=14547</code>)
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Create/Edit Form Modal -->
    <dialog id="formModal" class="modal">
      <div class="modal-box">
        <h3 class="font-bold text-lg mb-4" id="modalTitle">Nieuw Formulier</h3>
        
        <form id="formForm">
          <input type="hidden" id="formId" name="id" />
          
          <div class="form-control mb-4">
            <label class="label">
              <span class="label-text">Forminator Form ID *</span>
            </label>
            <input type="text" id="formFormId" name="form_id" placeholder="14547" class="input input-bordered" required />
            <label class="label">
              <span class="label-text-alt">Het ID van het formulier in WordPress Forminator</span>
            </label>
          </div>

          <div class="form-control mb-4">
            <label class="label">
              <span class="label-text">Weergavenaam *</span>
            </label>
            <input type="text" id="formName" name="form_name" placeholder="Webinar Inschrijving" class="input input-bordered" required />
            <label class="label">
              <span class="label-text-alt">Naam zoals deze verschijnt in de dropdown</span>
            </label>
          </div>

          <div class="form-control mb-4">
            <label class="label">
              <span class="label-text">Beschrijving</span>
            </label>
            <textarea id="formDescription" name="description" placeholder="Optionele beschrijving..." class="textarea textarea-bordered" rows="2"></textarea>
          </div>

          <div class="form-control mb-4">
            <label class="label">
              <span class="label-text">Volgorde</span>
            </label>
            <input type="number" id="formDisplayOrder" name="display_order" value="0" class="input input-bordered" />
            <label class="label">
              <span class="label-text-alt">Lager getal = hoger in de lijst</span>
            </label>
          </div>

          <div class="form-control mb-4">
            <label class="label cursor-pointer">
              <span class="label-text">Actief</span>
              <input type="checkbox" id="formIsActive" name="is_active" class="checkbox checkbox-primary" checked />
            </label>
            <label class="label">
              <span class="label-text-alt">Alleen actieve formulieren verschijnen in de dropdown</span>
            </label>
          </div>

          <div class="modal-action">
            <button type="button" id="closeModalBtn" class="btn btn-ghost">Annuleren</button>
            <button type="submit" class="btn btn-primary">
              <i data-lucide="save" class="w-4 h-4"></i>
              Opslaan
            </button>
          </div>
        </form>
      </div>
      <form method="dialog" class="modal-backdrop">
        <button>close</button>
      </form>
    </dialog>

    <script type="module">
      import { renderNavbar } from './admin-dashboard.js';
      
      let forms = [];
      let editingFormId = null;

      // Initialize
      async function init() {
        await renderNavbar();
        await loadForms();
        bindEvents();
        lucide.createIcons();
      }

      // Load forms from API
      async function loadForms() {
        try {
          const response = await fetch('/events/api/forminator-forms', {
            credentials: 'include'
          });
          
          if (!response.ok) {
            throw new Error('Failed to fetch forms');
          }
          
          const result = await response.json();
          forms = result.data || [];
          renderFormsTable();
        } catch (error) {
          console.error('Load forms failed:', error);
          document.getElementById('formsTable').innerHTML = `
            <div class="alert alert-error">
              <i data-lucide="alert-circle" class="w-5 h-5"></i>
              <span>Fout bij laden formulieren: ${error.message}</span>
            </div>
          `;
          lucide.createIcons();
        }
      }

      // Render forms table
      function renderFormsTable() {
        const tableHtml = `
          <table class="table table-zebra w-full">
            <thead>
              <tr>
                <th>Form ID</th>
                <th>Naam</th>
                <th>Beschrijving</th>
                <th>Volgorde</th>
                <th>Status</th>
                <th>Acties</th>
              </tr>
            </thead>
            <tbody>
              ${forms.map(form => `
                <tr>
                  <td><code class="badge badge-ghost">${form.form_id}</code></td>
                  <td><strong>${form.form_name}</strong></td>
                  <td>${form.description || '<span class="text-gray-400">-</span>'}</td>
                  <td>${form.display_order}</td>
                  <td>
                    ${form.is_active 
                      ? '<span class="badge badge-success">Actief</span>' 
                      : '<span class="badge badge-ghost">Inactief</span>'}
                  </td>
                  <td>
                    <div class="flex gap-2">
                      <button class="btn btn-sm btn-ghost" onclick="window.editForm(${form.id})">
                        <i data-lucide="edit-2" class="w-4 h-4"></i>
                      </button>
                      <button class="btn btn-sm btn-ghost btn-error" onclick="window.deleteForm(${form.id}, '${form.form_name}')">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                      </button>
                    </div>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
          ${forms.length === 0 ? `
            <div class="text-center py-8 text-gray-500">
              <i data-lucide="inbox" class="w-12 h-12 mx-auto mb-2 opacity-50"></i>
              <p>Geen formulieren gevonden</p>
              <button class="btn btn-sm btn-primary mt-4" onclick="document.getElementById('addFormBtn').click()">
                Voeg eerste formulier toe
              </button>
            </div>
          ` : ''}
        `;
        
        document.getElementById('formsTable').innerHTML = tableHtml;
        lucide.createIcons();
      }

      // Bind events
      function bindEvents() {
        document.getElementById('addFormBtn').addEventListener('click', () => {
          openModal();
        });

        document.getElementById('closeModalBtn').addEventListener('click', () => {
          closeModal();
        });

        document.getElementById('formForm').addEventListener('submit', async (e) => {
          e.preventDefault();
          await saveForm();
        });
      }

      // Open modal (create or edit)
      function openModal(form = null) {
        editingFormId = form ? form.id : null;
        
        document.getElementById('modalTitle').textContent = form ? 'Formulier Bewerken' : 'Nieuw Formulier';
        document.getElementById('formId').value = form ? form.id : '';
        document.getElementById('formFormId').value = form ? form.form_id : '';
        document.getElementById('formFormId').disabled = !!form; // Disable editing form_id
        document.getElementById('formName').value = form ? form.form_name : '';
        document.getElementById('formDescription').value = form ? (form.description || '') : '';
        document.getElementById('formDisplayOrder').value = form ? form.display_order : 0;
        document.getElementById('formIsActive').checked = form ? form.is_active : true;
        
        document.getElementById('formModal').showModal();
      }

      // Close modal
      function closeModal() {
        document.getElementById('formModal').close();
        document.getElementById('formForm').reset();
        editingFormId = null;
      }

      // Save form
      async function saveForm() {
        const formData = {
          form_id: document.getElementById('formFormId').value.trim(),
          form_name: document.getElementById('formName').value.trim(),
          description: document.getElementById('formDescription').value.trim() || null,
          display_order: parseInt(document.getElementById('formDisplayOrder').value, 10),
          is_active: document.getElementById('formIsActive').checked
        };

        try {
          const url = editingFormId 
            ? `/events/api/forminator-forms/${editingFormId}`
            : '/events/api/forminator-forms';
          
          const method = editingFormId ? 'PUT' : 'POST';
          
          const response = await fetch(url, {
            method,
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify(formData)
          });

          if (!response.ok) {
            const error = await response.json();
            throw new Error(error.error || 'Failed to save form');
          }

          alert(editingFormId ? 'Formulier bijgewerkt!' : 'Formulier toegevoegd!');
          closeModal();
          await loadForms();
        } catch (error) {
          console.error('Save form failed:', error);
          alert('Fout bij opslaan: ' + error.message);
        }
      }

      // Delete form
      async function deleteForm(id, name) {
        if (!confirm(`Weet je zeker dat je "${name}" wilt verwijderen?`)) {
          return;
        }

        try {
          const response = await fetch(`/events/api/forminator-forms/${id}`, {
            method: 'DELETE',
            credentials: 'include'
          });

          if (!response.ok) {
            throw new Error('Failed to delete form');
          }

          alert('Formulier verwijderd!');
          await loadForms();
        } catch (error) {
          console.error('Delete form failed:', error);
          alert('Fout bij verwijderen: ' + error.message);
        }
      }

      // Edit form
      function editForm(id) {
        const form = forms.find(f => f.id === id);
        if (form) {
          openModal(form);
        }
      }

      // Expose functions to window
      window.editForm = editForm;
      window.deleteForm = deleteForm;

      // Start
      init();
    </script>
</body>
</html>
