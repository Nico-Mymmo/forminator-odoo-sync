<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beheer - OpenVME Operations Manager</title>
    <script>
      (function() {
        var t = localStorage.getItem('selectedTheme') || 'light';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/shared-navbar.js"></script>
</head>
<body class="bg-base-200" style="overflow-y: scroll;">
    <div id="navbar"></div>

    <div style="padding-top: 48px;">
      <div class="container mx-auto px-6 py-8 max-w-7xl">
        <div class="mb-6">
          <h1 class="text-2xl font-bold">Beheer</h1>
          <p class="text-sm text-base-content/60 mt-1">Beheer gebruikers en moduletoegang</p>
        </div>

        <div class="stats border border-base-200 bg-base-100 shadow-sm w-full mb-6">
          <div class="stat py-4">
            <div class="stat-figure text-primary">
              <i data-lucide="users" class="w-7 h-7"></i>
            </div>
            <div class="stat-title text-sm">Gebruikers</div>
            <div class="stat-value text-primary text-2xl" id="statsUsers"><div class="skeleton h-8 w-16 rounded"></div></div>
            <div class="stat-desc">Actieve accounts</div>
          </div>

          <div class="stat py-4">
            <div class="stat-figure text-accent">
              <i data-lucide="package" class="w-7 h-7"></i>
            </div>
            <div class="stat-title text-sm">Actieve modules</div>
            <div class="stat-value text-accent text-2xl" id="statsModules"><div class="skeleton h-8 w-16 rounded"></div></div>
            <div class="stat-desc">Beschikbare modules</div>
          </div>
        </div>

        <div role="tablist" class="tabs tabs-lifted">
          <!-- ============ TAB: GEBRUIKERS ============ -->
          <input type="radio" name="admin_tabs" role="tab" class="tab" aria-label="Gebruikers" id="tabUsers" checked />
          <div role="tabpanel" class="tab-content bg-base-100 border-base-300 rounded-box p-6">
            <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
              <h2 class="text-base font-semibold">Gebruikersbeheer</h2>
              <input type="text" id="userSearch" class="input input-bordered input-sm w-full max-w-xs" placeholder="Zoek op naam of e-mail&hellip;">
            </div>

            <div id="usersTable" class="overflow-x-auto">
              <div class="flex justify-center py-20">
                <span class="loading loading-spinner loading-md text-primary"></span>
              </div>
            </div>
          </div>

          <!-- ============ TAB: GEBRUIKER AANMAKEN ============ -->
          <input type="radio" name="admin_tabs" role="tab" class="tab" aria-label="Aanmaken" id="tabCreate" />
          <div role="tabpanel" class="tab-content bg-base-100 border-base-300 rounded-box p-6">
            <h2 class="text-base font-semibold mb-4">Nieuwe gebruiker aanmaken</h2>

            <form id="createUserForm" class="max-w-2xl">
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-2">
                <label class="form-control w-full">
                  <div class="label"><span class="label-text">E-mailadres <span class="text-error">*</span></span></div>
                  <input type="email" name="email" placeholder="naam@mymmo.com" class="input input-bordered input-sm w-full" required />
                </label>

                <label class="form-control w-full">
                  <div class="label"><span class="label-text">Wachtwoord <span class="text-error">*</span></span></div>
                  <input type="password" name="password" placeholder="Minimaal 8 tekens" class="input input-bordered input-sm w-full" autocomplete="new-password" required />
                  <div class="label py-1"><span class="label-text-alt text-xs text-base-content/50">Minimaal 8 tekens</span></div>
                </label>
              </div>

              <label class="form-control w-full max-w-md mb-2">
                <div class="label"><span class="label-text">Rol <span class="text-error">*</span></span></div>
                <select name="role" class="select select-bordered select-sm" required>
                  <option value="user">Gebruiker</option>
                  <option value="manager">Manager</option>
                  <option value="marketing_signature">Marketing Signatures</option>
                  <option value="admin">Admin</option>
                </select>
              </label>

              <div class="form-control mb-4">
                <div class="label"><span class="label-text">Modules</span></div>
                <div id="moduleCheckboxes" class="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-1">
                  <div class="flex justify-center py-2">
                    <span class="loading loading-spinner loading-sm"></span>
                  </div>
                </div>
              </div>

              <button type="submit" class="btn btn-primary btn-sm gap-2" id="createUserBtn">
                <i data-lucide="user-plus" class="w-4 h-4"></i>
                <span data-role="createBtnLabel">Gebruiker aanmaken</span>
              </button>
            </form>
          </div>

          <!-- ============ TAB: MODULES ============ -->
          <input type="radio" name="admin_tabs" role="tab" class="tab" aria-label="Modules" id="tabModules" />
          <div role="tabpanel" class="tab-content bg-base-100 border-base-300 rounded-box p-6">
            <h2 class="text-base font-semibold mb-4">Beschikbare modules</h2>
            <div id="modulesTable" class="overflow-x-auto">
              <div class="flex justify-center py-20">
                <span class="loading loading-spinner loading-md text-primary"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ====== Bevestigingsmodal (generiek) ====== -->
    <dialog id="confirmModal" class="modal">
      <div class="modal-box max-w-md">
        <h3 class="font-bold text-lg" id="confirmTitle">Bevestigen</h3>
        <p class="py-3 text-sm text-base-content/70" id="confirmBody"></p>
        <div class="modal-action">
          <button class="btn btn-sm" id="confirmOkBtn" data-action="confirmOk">Bevestigen</button>
          <button class="btn btn-ghost btn-sm" data-action="closeConfirm">Annuleren</button>
        </div>
      </div>
      <form method="dialog" class="modal-backdrop"><button>sluiten</button></form>
    </dialog>

    <!-- ====== Modules-bewerken-modal ====== -->
    <dialog id="modulesModal" class="modal">
      <div class="modal-box max-w-md">
        <h3 class="font-bold text-lg mb-1">Modules bewerken</h3>
        <p class="text-sm text-base-content/60 mb-3" id="modulesModalSub"></p>
        <div class="space-y-1 max-h-72 overflow-y-auto" id="modulesModalList"></div>
        <div class="modal-action">
          <button class="btn btn-primary btn-sm" id="saveModulesBtn" data-action="saveUserModules">Opslaan</button>
          <button class="btn btn-ghost btn-sm" data-action="closeModulesModal">Annuleren</button>
        </div>
      </div>
      <form method="dialog" class="modal-backdrop"><button>sluiten</button></form>
    </dialog>

    <!-- ====== Module-gebruikers-modal ====== -->
    <dialog id="moduleUsersModal" class="modal">
      <div class="modal-box max-w-md">
        <h3 class="font-bold text-lg mb-1">Gebruikers met toegang</h3>
        <p class="text-sm text-base-content/60 mb-3" id="moduleUsersModalSub"></p>
        <input type="text" id="moduleUsersSearch" class="input input-bordered input-sm w-full mb-3" placeholder="Zoek op naam of e-mail&hellip;">
        <div class="space-y-1 max-h-72 overflow-y-auto" id="moduleUsersModalList"></div>
        <div class="modal-action">
          <button class="btn btn-primary btn-sm" id="saveModuleUsersBtn" data-action="saveModuleUsers">Opslaan</button>
          <button class="btn btn-ghost btn-sm" data-action="closeModuleUsersModal">Annuleren</button>
        </div>
      </div>
      <form method="dialog" class="modal-backdrop"><button>sluiten</button></form>
    </dialog>

    <!-- ====== Toast-container ====== -->
    <div id="toastContainer" class="toast toast-end z-50"></div>

    <script src="/admin-dashboard.js"></script>
</body>
</html>
